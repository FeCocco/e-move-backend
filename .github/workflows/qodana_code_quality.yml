name: CI do e-Move (Spring Boot & Maven)

on:
  push:
    branches: [ "main", "Feature/AutomatedTests" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Fazer o Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar o Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Rodar os Testes Unitários
        run: mvn clean test